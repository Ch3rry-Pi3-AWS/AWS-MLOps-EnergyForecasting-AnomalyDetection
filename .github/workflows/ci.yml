name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run tests
        run: pytest

      - name: Compile Python entry points
        run: python -m py_compile scripts/deploy.py scripts/destroy.py scripts/run_forecast_training.py scripts/run_anomaly_training.py scripts/run_forecast_sarimax_training.py scripts/run_forecast_deepar_training.py scripts/deploy_forecast_endpoint.py scripts/deploy_anomaly_endpoint.py scripts/invoke_forecast_endpoint.py scripts/invoke_anomaly_endpoint.py scripts/evaluate_model_package.py lambda/ingestion/app.py glue/jobs/bronze_to_silver.py glue/jobs/silver_to_gold.py sagemaker/forecast_training/train.py sagemaker/forecast_training/inference.py sagemaker/forecast_sarimax_training/train.py sagemaker/forecast_sarimax_training/inference.py sagemaker/anomaly_training/train.py sagemaker/anomaly_training/inference.py

      - name: Run Ruff
        run: ruff check .

  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Check formatting
        run: terraform fmt -check -recursive

      - name: Validate Terraform modules
        run: |
          for dir in terraform/01_project_context terraform/02_kms terraform/03_s3_lakehouse terraform/04_iam_foundation terraform/05_lambda_ingestion terraform/06_eventbridge_scheduler terraform/07_glue_catalog terraform/08_glue_bronze_to_silver_job terraform/09_glue_bronze_to_silver_scheduler terraform/10_glue_silver_to_gold_job terraform/11_glue_silver_to_gold_scheduler terraform/12_sagemaker_model_registry terraform/13_sagemaker_studio_domain terraform/14_sagemaker_forecast_training terraform/15_sagemaker_anomaly_training terraform/16_sagemaker_forecast_endpoint terraform/17_sagemaker_anomaly_endpoint terraform/18_sagemaker_forecast_endpoint_ops terraform/19_sagemaker_model_evaluation terraform/20_sagemaker_anomaly_endpoint_ops terraform/21_sagemaker_forecast_sarimax_training terraform/22_sagemaker_forecast_deepar_training; do
            terraform -chdir="$dir" init -backend=false
            terraform -chdir="$dir" validate
          done
